<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Projects</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      color: #38bdf8;
    }

    .container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 40px;
    }

    .box {
      width: 300px;
      padding: 20px;
      background: #111827;
      border-radius: 15px;
      margin: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      transition: 0.3s ease;
    }

    .box:hover {
      transform: translateY(-10px);
    }

    .box h2 {
      color: #38bdf8;
    }

    .box p {
      color: #cbd5e1;
      font-size: 14px;
      margin-bottom: 15px;
    }

    .launch-btn {
      padding: 12px 20px;
      background: linear-gradient(135deg, #38bdf8, #2563eb);
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      color: white;
      transition: 0.3s;
    }

    .launch-btn:hover {
      transform: scale(1.05);
    }

    a {
      text-decoration: none;
    }

  </style>
</head>

<body>

  <h1>🚀 My Projects</h1>

  <div class="container">

    <!-- Age Calculator Project -->
    <div class="box">

      <h2>Age Calculator Project</h2>

      <p>Modern AI-powered age calculator website built using HTML, CSS & JavaScript.</p>

      <a href="https://replit.com/@chandrannagr21/Future-Assets?s=app" target="_blank">
        <button class="launch-btn">
          Launch Project
        </button>
      </a>

    </div>

  </div>

</body>
</html>
